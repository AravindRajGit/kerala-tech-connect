<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found | Kerala Tech Connect</title>
    <meta name="description" content="The requested page could not be found." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
    <style>
      .error-page {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px 0;
      }

      .error-card {
        width: min(100%, 680px);
        padding: 36px;
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.88);
        border: 1px solid rgba(255, 255, 255, 0.75);
        box-shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
        text-align: center;
      }

      .error-code {
        margin: 0;
        font-size: clamp(4rem, 12vw, 7rem);
        letter-spacing: -0.08em;
        line-height: 1;
        color: var(--brand);
      }

      .error-card p {
        max-width: 46ch;
        margin: 16px auto 0;
        color: var(--muted);
        line-height: 1.8;
      }

      .error-actions {
        margin-top: 28px;
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 12px;
      }
    </style>
  </head>
  <body>
    <main class="error-page">
      <section class="error-card">
        <span class="eyebrow">Kerala Tech Connect</span>
        <h1 class="error-code">404</h1>
        <h2>Page not found</h2>
        <p>
          The page you’re looking for doesn’t exist or may have been moved. Use the link below to
          return to the homepage.
        </p>
        <div class="error-actions">
          <a class="btn btn--primary" href="index.html">Go to Home</a>
          <a class="btn btn--secondary" href="speakers.html">Explore Speakers</a>
        </div>
      </section>
    </main>
  </body>
</html>
