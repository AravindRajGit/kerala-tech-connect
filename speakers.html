<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Speakers | Kerala Tech Connect</title>
    <meta
      name="description"
      content="Browse tech speakers in Kerala by topics, location, and expertise."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body data-page="speakers">
    <div id="site-header"></div>

    <main class="page-shell">
      <section class="page-hero container">
        <div class="page-hero__copy reveal">
          <span class="eyebrow">Tech Speakers</span>
          <h1>Find keynote speakers, mentors, and workshop hosts across Kerala</h1>
          <p>
            Discover professionals who speak on engineering, product, cloud, AI, design, and
            startup culture.
          </p>
        </div>
        <div class="toolbar reveal">
          <label class="search">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input id="speaker-search" type="search" placeholder="Search speakers, topics, cities" />
          </label>
          <div class="filter-row" id="speaker-filters"></div>
        </div>
      </section>

      <section class="section container">
        <div class="card-grid card-grid--3 reveal" id="speakers-grid"></div>
      </section>
    </main>

    <div id="site-footer"></div>

    <script src="js/data.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
